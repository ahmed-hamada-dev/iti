<div class="w-100 mx-auto" style="max-width: 1200px">
  <div class="d-flex align-items-center justify-content-between mb-2">
    <span class="text-muted small">
      Image {{ currentIndex + 1 }} of {{ slider.images.length }}
    </span>
    <button
      type="button"
      class="btn btn-outline-secondary btn-sm d-flex align-items-center gap-1"
      (click)="togglePlay()"
    >
      @if (isPlaying) {
        <span>&#10074;&#10074;</span>
        <span class="small">Pause</span>
      } @else {
        <span class="small">Play</span>
      }
    </button>
  </div>

  <div
    class="position-relative w-100 overflow-hidden rounded-3 shadow"
    style="height: 280px; background: #000"
  >
    <img
      [src]="slider.images[currentIndex]"
      alt="slider image"
      class="w-100 h-100 position-absolute top-0 start-0"
      style="object-fit: contain; padding: 12px; transition: opacity 0.5s ease-in-out"
    />

    <button
      type="button"
      class="position-absolute top-50 start-0 translate-middle-y btn btn-dark bg-opacity-50 border-0 rounded-end-0 px-3 py-2"
      style="z-index: 2; border-radius: 0 8px 8px 0"
      (click)="prev()"
      aria-label="Previous"
    >
      <span class="fs-5 fw-bold">&lsaquo;</span>
    </button>

    <button
      type="button"
      class="position-absolute top-50 end-0 translate-middle-y btn btn-dark bg-opacity-50 border-0 rounded-start-0 px-3 py-2"
      style="z-index: 2; border-radius: 8px 0 0 8px"
      (click)="next()"
      aria-label="Next"
    >
      <span class="fs-5 fw-bold">&rsaquo;</span>
    </button>

    <div
      class="position-absolute bottom-0 start-50 translate-middle-x d-flex align-items-center gap-2 pb-3"
      style="z-index: 2"
    >
      @for (img of slider.images; track $index) {
        <button
          type="button"
          class="border-0 rounded-circle p-0"
          style="width: 10px; height: 10px; cursor: pointer"
          [class.bg-white]="$index === currentIndex"
          [class.bg-secondary]="$index !== currentIndex"
          [attr.aria-label]="'Slide ' + ($index + 1)"
          (click)="goTo($index)"
        ></button>
      }
    </div>
  </div>
</div>
