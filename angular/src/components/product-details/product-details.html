<div class="container py-4">
  <a routerLink="/" class="btn btn-link mb-3 ps-0">&larr; Back to Products</a>

  @if (product(); as p) {
    <div class="row g-4">
      <div class="col-md-5">
        <div class="detail-image-wrap">
          <img
            [src]="p.image"
            [alt]="p.title"
            class="detail-image"
            appImageZoom
            zoomScale="1.3"
          />
        </div>
      </div>

      <div class="col-md-7">
        <h2>{{ p.title }}</h2>
        <p class="text-muted">{{ p.brand }} | {{ p.category }}</p>

        <h3 class="text-primary">${{ p.price }}</h3>

        @if (p.stock > 0) {
          <span class="badge bg-success">In Stock ({{ p.stock }})</span>
        } @else {
          <span class="badge bg-danger">Out Of Stock</span>
        }

        <p class="mt-3">
          {{ showFull() ? p.description : (p.description | shortDescription) }}
        </p>
        <button
          type="button"
          class="btn btn-link p-0 text-decoration-none"
          (click)="toggleDescription()"
        >
          {{ showFull() ? 'Hide Description' : 'See All Description' }}
        </button>

        <div class="mt-4">
          <button
            type="button"
            class="btn btn-primary"
            [disabled]="p.stock <= 0 || isBought()"
            (click)="buy()"
          >
            {{ isBought() ? 'Bought' : 'Buy' }}
          </button>
        </div>
      </div>
    </div>
  } @else {
    <div class="alert alert-warning">Product not found.</div>
  }
</div>
