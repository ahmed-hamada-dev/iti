<section class="products-section py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="mb-0">Products</h2>
    <span class="text-muted small">
      Showing {{ filteredProducts.length }} of {{ products.length }}
    </span>
  </div>

  <div class="filter-bar card p-3 mb-4 shadow-sm">
    <div class="row g-3">
      <div class="col-12 col-md-4">
        <label class="form-label small mb-1">Search</label>
        <input
          type="text"
          class="form-control"
          placeholder="Search by title..."
          [value]="searchTerm"
          (input)="onSearch($event)"
        />
      </div>

      <div class="col-6 col-md-2">
        <label class="form-label small mb-1">Category</label>
        <select
          class="form-select"
          [value]="selectedCategory"
          (change)="onCategoryChange($event)"
        >
          <option value="all">All</option>
          @for (c of categories; track c) {
            <option [value]="c">{{ c }}</option>
          }
        </select>
      </div>

      <div class="col-6 col-md-2">
        <label class="form-label small mb-1">Brand</label>
        <select
          class="form-select"
          [value]="selectedBrand"
          (change)="onBrandChange($event)"
        >
          <option value="all">All</option>
          @for (b of brands; track b) {
            <option [value]="b">{{ b }}</option>
          }
        </select>
      </div>

      <div class="col-6 col-md-2">
        <label class="form-label small mb-1">Min Price</label>
        <input
          type="number"
          min="0"
          class="form-control"
          placeholder="0"
          [value]="minPrice ?? ''"
          (input)="onMinPriceChange($event)"
        />
      </div>

      <div class="col-6 col-md-2">
        <label class="form-label small mb-1">Max Price</label>
        <input
          type="number"
          min="0"
          class="form-control"
          placeholder="Any"
          [value]="maxPrice ?? ''"
          (input)="onMaxPriceChange($event)"
        />
      </div>
    </div>

    <div class="d-flex justify-content-between align-items-center mt-3 flex-wrap gap-2">
      <div class="form-check">
        <input
          class="form-check-input"
          type="checkbox"
          id="inStockOnly"
          [checked]="inStockOnly"
          (change)="toggleInStock()"
        />
        <label class="form-check-label" for="inStockOnly">In stock only</label>
      </div>
      <button
        type="button"
        class="btn btn-outline-secondary btn-sm"
        (click)="clearFilters()"
      >
        Clear Filters
      </button>
    </div>
  </div>

  <div class="row g-4">
    @for (product of filteredProducts; track product.id) {
      <div class="col-12 col-sm-6 col-md-4 col-lg-3">
        <app-product-card
          [product]="product"
          [isSelected]="isSelected(product.id)"
          [isBought]="isBought(product.id)"
          (select)="onSelect($event)"
          (buy)="onBuy($event)"
        ></app-product-card>
      </div>
    } @empty {
      <div class="col-12">
        <div class="alert alert-warning text-center mb-0">
          No products match your filters.
        </div>
      </div>
    }
  </div>

  <div class="total-bar mt-4 p-3 d-flex justify-content-between align-items-center rounded shadow-sm">
    <span class="total-label fw-semibold">Total Price</span>
    <span class="total-amount">${{ total }}</span>
  </div>
</section>
